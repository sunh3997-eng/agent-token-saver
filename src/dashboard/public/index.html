<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Token Saver - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #38bdf8; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; }
    .card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
    .card .value.green { color: #4ade80; }
    .card .value.blue { color: #38bdf8; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
    th, td { padding: 0.75rem 1rem; text-align: left; }
    th { background: #334155; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; }
    td { border-top: 1px solid #334155; font-size: 0.875rem; }
    .savings { color: #4ade80; font-weight: 600; }
  </style>
</head>
<body>
  <h1>⚡ Agent Token Saver</h1>
  <div class="cards">
    <div class="card"><div class="label">Total Requests</div><div class="value blue" id="totalReqs">-</div></div>
    <div class="card"><div class="label">Tokens Saved</div><div class="value green" id="totalSaved">-</div></div>
    <div class="card"><div class="label">Avg Savings</div><div class="value green" id="avgSavings">-</div></div>
    <div class="card"><div class="label">Est. $ Saved</div><div class="value green" id="dollarSaved">-</div></div>
  </div>
  <h2 style="margin-bottom:1rem;font-size:1.1rem;">Recent Requests</h2>
  <table>
    <thead><tr><th>Time</th><th>Model</th><th>Original</th><th>Compressed</th><th>Saved</th><th>%</th></tr></thead>
    <tbody id="reqs"></tbody>
  </table>
  <script>
    async function refresh() {
      const res = await fetch('/api/stats');
      const d = await res.json();
      document.getElementById('totalReqs').textContent = d.totalRequests.toLocaleString();
      document.getElementById('totalSaved').textContent = d.totalTokensSaved.toLocaleString();
      document.getElementById('avgSavings').textContent = d.avgSavingsPercent + '%';
      document.getElementById('dollarSaved').textContent = '$' + (d.totalTokensSaved * 0.000003).toFixed(4);
      const tbody = document.getElementById('reqs');
      tbody.innerHTML = (d.recentRequests || []).map(r => `<tr>
        <td>${new Date(r.timestamp).toLocaleTimeString()}</td>
        <td>${r.model || '-'}</td>
        <td>${r.originalTokens?.toLocaleString()}</td>
        <td>${r.compressedTokens?.toLocaleString()}</td>
        <td class="savings">${r.savedTokens?.toLocaleString()}</td>
        <td class="savings">${r.savingsPercent}%</td>
      </tr>`).join('');
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
